<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOM — Browser Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }
    #pointerLockHint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FFAA00;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="pointerLockHint">Click to capture mouse · WASD to move · ESC to release</div>
  <script src="raycaster.js"></script>
  <script src="level.js"></script>
  <script src="game.js"></script>
</body>
</html>
